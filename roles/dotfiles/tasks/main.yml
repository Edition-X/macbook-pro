---
- name: .aliases - Config file
  ansible.builtin.file:
    src: "{{ host_files_dir }}/aliases"
    dest: "{{ config_paths.aliases }}"
    owner: "{{ ansible_user_uid | quote }}"
    group: "{{ ansible_user_gid | quote }}"
    state: link
  tags:
    - dot

- name: Pyrightconfig - Config file
  ansible.builtin.file:
    src: "{{ host_files_dir }}/pyrightconfig.json"
    dest: "{{ config_paths.pyright_config }}"
    owner: "{{ ansible_user_uid | quote }}"
    group: "{{ ansible_user_gid | quote }}"
    state: link
  tags:
    - dot

- name: .env_vars - Config file
  no_log: true
  ansible.builtin.template:
    src: "env_vars.j2"
    dest: "{{ config_paths.env_vars }}"
    owner: "{{ ansible_user_uid | quote }}"
    group: "{{ ansible_user_gid | quote }}"
    mode: '0600'
  tags:
    - dot

- name: .zshrc - Config file
  ansible.builtin.template:
    src: "zshrc.j2"
    dest: "{{ config_paths.zshrc }}"
    owner: "{{ ansible_user_uid | quote }}"
    group: "{{ ansible_user_gid | quote }}"
    mode: '0644'
  tags:
    - dot

- name: Ghostty - Config directory
  ansible.builtin.file:
    path: "{{ user_dir }}/.config/ghostty"
    state: directory
    owner: "{{ ansible_user_uid | quote }}"
    group: "{{ ansible_user_gid | quote }}"
    mode: '0700'
  tags:
    - dot

- name: Ghostty - Config file
  ansible.builtin.copy:
    src: "{{ host_files_dir }}/ghostty.config"
    dest: "{{ config_paths.ghostty_config }}"
    owner: "{{ ansible_user_uid | quote }}"
    group: "{{ ansible_user_gid | quote }}"
    mode: '0644'
  tags:
    - dot

- name: .functions - Config file
  ansible.builtin.file:
    src: "{{ host_files_dir }}/functions"
    dest: "{{ config_paths.functions }}"
    owner: "{{ ansible_user_uid | quote }}"
    group: "{{ ansible_user_gid | quote }}"
    state: link
  tags:
    - dot

- name: Starship.toml - Config file
  ansible.builtin.file:
    src: "{{ host_files_dir }}/starship.toml"
    dest: "{{ config_paths.starship_config }}"
    owner: "{{ ansible_user_uid | quote }}"
    group: "{{ ansible_user_gid | quote }}"
    state: link
  tags:
    - dot

- name: .env_secrets - Secret environment variables
  no_log: true
  ansible.builtin.template:
    src: "env_secrets.j2"
    dest: "{{ config_paths.env_secrets }}"
    owner: "{{ ansible_user_uid | quote }}"
    group: "{{ ansible_user_gid | quote }}"
    mode: '0600'
  tags:
    - dot

- name: Forge - Config directory
  ansible.builtin.file:
    path: "{{ config_paths.forge_dir }}"
    state: directory
    owner: "{{ ansible_user_uid | quote }}"
    group: "{{ ansible_user_gid | quote }}"
    mode: '0700'
  tags:
    - dot
    - forge

- name: Forge - Skills directory
  ansible.builtin.copy:
    src: "{{ host_files_dir }}/forge/skills/"
    dest: "{{ config_paths.forge_skills }}/"
    owner: "{{ ansible_user_uid | quote }}"
    group: "{{ ansible_user_gid | quote }}"
    mode: preserve
  tags:
    - dot
    - forge

- name: Forge - MCP config
  ansible.builtin.template:
    src: "forge.mcp.json.j2"
    dest: "{{ config_paths.forge_mcp }}"
    owner: "{{ ansible_user_uid | quote }}"
    group: "{{ ansible_user_gid | quote }}"
    mode: '0600'
  tags:
    - dot
    - forge
